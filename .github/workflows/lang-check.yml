name: Translation Check

on:
  push:
    paths:
      - 'src/main/resources/assets/light-overlay/lang/**.json'
  pull_request:
    paths:
      - 'src/main/resources/assets/light-overlay/lang/**.json'

jobs:
  lang-check:
    name: Lang Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run Lang Check
        run: python .github/scripts/lang_check.py